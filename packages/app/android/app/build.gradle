plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// Fix duplicate tink classes issue (tink vs tink-android)
// https://pub.dev/packages/unifiedpush#the-build-fails-because-of-duplicate-classes
def tink = 'com.google.crypto.tink:tink-android:1.19.0'
configurations.all {
    resolutionStrategy {
        force tink
        dependencySubstitution {
            substitute module('com.google.crypto.tink:tink') using module(tink)
        }
    }
}

def keystoreProperties = new Properties()
def localProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localProperties.load(new FileInputStream(localPropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode','1')
def flutterVersionName = localProperties.getProperty('flutter.versionName','1.0')
def flutterNDKVersion = localProperties.getProperty('flutter.ndkVersion','29.0.13113456').toString()

apply from: "../../../keychat_rust_ffi_plugin/cargokit/gradle/plugin.gradle"
cargokit {
    manifestDir = "../../../keychat_rust_ffi_plugin/rust"
    libname = "keychat_rust_ffi_plugin"
}

android {
    compileSdkVersion localProperties.getProperty('flutter.compileSdkVersion','35').toInteger()
    namespace "com.keychat.io"
    ndkVersion flutterNDKVersion
    compileOptions {
        // Ensures Java 21 compatibility.
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        // Align Kotlin with Java 21 bytecode.
        jvmTarget = '21'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.keychat.io"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion localProperties.getProperty('flutter.minSdkVersion','31').toInteger()
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        // ABIs are controlled via:
        //   - splits.abi (for APK tasks)
        //   - Flutter's --target-platform (for AAB tasks)
        //   - packaging.jniLibs.excludes (drops stray 3rd-party .so)
        // Setting ndk.abiFilters here conflicts with splits.abi on AGP 8+.
    }
    splits {
        abi {
            // Only enable when user explicitly passes --split-per-abi.
            // Without that flag, Flutter injects ndk.abiFilters itself, which
            // conflicts with splits.abi on AGP 8+ (cannot coexist).
            enable project.hasProperty("split-per-abi")
            reset()
            include 'arm64-v8a', 'x86_64'
            universalApk false
        }
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            ndk {
                // 'SYMBOL_TABLE' produces compact native symbols (.sym) for
                // Play Console crash symbolication. 'NONE' would fail Flutter's
                // post-build check (gradle.dart:_isAabStrippedOfDebugSymbols).
                debugSymbolLevel 'SYMBOL_TABLE'
            }
        }
    }

    // Drop stray prebuilt .so files that ship inside 3rd-party AARs for
    // ABIs we don't target. Keep arm64-v8a and x86_64.
    packaging {
        jniLibs {
            excludes += ['lib/armeabi-v7a/**', 'lib/x86/**']
        }
    }
    
    android.applicationVariants.all { variant ->
        def buildType = variant.buildType.name
        
        variant.outputs.all { output ->
            output.versionCodeOverride = flutterVersionCode.toInteger()
            
            def abiName = output.getFilter(com.android.build.OutputFile.ABI)
            
            def abiSuffix = abiName ? "-${abiName}" : "-universal"
            
            outputFileName = "Keychat-${flutterVersionName}+${flutterVersionCode}-android${abiSuffix}.apk"
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'com.google.android.material:material:1.12.0'
}